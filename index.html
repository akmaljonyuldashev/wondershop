<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wondershop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #171717;
      --muted: #777;
      --accent: #111;
      --line: #e7e0d6;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .brand {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: .08em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .back-btn {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }

    .back-btn.show {
      display: inline-flex;
    }

    .screen-title {
      font-size: 22px;
      font-weight: 800;
      margin: 20px 0 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: .18s ease;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:active {
      transform: scale(.98);
    }

    .emoji {
      font-size: 30px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.2;
    }

    .card-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .products {
      display: grid;
      gap: 14px;
    }

    .product {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .product-img {
      width: 100%;
      height: 210px;
      background:
        radial-gradient(circle at 25% 25%, rgba(255,255,255,.95), rgba(255,255,255,0) 34%),
        linear-gradient(135deg, #111, #444);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: .08em;
    }

    .product-body {
      padding: 16px;
    }

    .product-title {
      font-size: 18px;
      font-weight: 850;
      margin-bottom: 8px;
    }

    .product-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .price {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .choose-btn {
      width: 100%;
      border: none;
      background: var(--accent);
      color: white;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .empty {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 420px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .brand {
        font-size: 22px;
      }

      .product-img {
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="brand">WONDERSHOP</div>
        <div class="subtitle">Одежда и товары с принтами</div>
      </div>
      <button class="back-btn" id="backBtn">← Назад</button>
    </div>

    <main id="content"></main>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const catalog = [
      {

          { id: "men_sweaters", title: "Толстовки", emoji: "🧥" },
          { id: "men_sweatshirts", title: "Свитшоты", emoji: "👔" },
          { id: "men_hoodies", title: "Худи", emoji: "🧢" },
          { id: "men_caps", title: "Кепки", emoji: "🧢" }
        ]
      },
      {
        id: "women",
        title: "Женская одежда",
        emoji: "👚",
        note: "Футболки, худи, свитшоты",
        subcategories: [
          { id: "women_tshirts", title: "Футболки", emoji: "👚" },
          { id: "women_tanks", title: "Майки", emoji: "🎽" },
          { id: "women_sweaters", title: "Толстовки", emoji: "🧥" },
          { id: "women_sweatshirts", title: "Свитшоты", emoji: "👔" },
          { id: "women_hoodies", title: "Худи", emoji: "🧢" }
        ]
      },
      {
        id: "kids",
        title: "Детская одежда",
        emoji: "🧒",
        note: "Детские футболки и худи",
        subcategories: [
          { id: "kids_tshirts", title: "Футболки", emoji: "👕" },
          { id: "kids_tanks", title: "Майки", emoji: "🎽" },
          { id: "kids_sweaters", title: "Толстовки", emoji: "🧥" },
          { id: "kids_sweatshirts", title: "Свитшоты", emoji: "👔" },
          { id: "kids_hoodies", title: "Худи", emoji: "🧢" },
          { id: "kids_caps", title: "Кепки", emoji: "🧢" }
        ]
      },
      {
        id: "mugs",
        title: "Кружки",
        emoji: "☕",
        note: "Кружки с принтами",
        subcategories: [
          { id: "mugs_classic", title: "Классические кружки", emoji: "☕" },
          { id: "mugs_color", title: "Цветные кружки", emoji: "🎨" },
          { id: "mugs_gift", title: "Подарочные кружки", emoji: "🎁" }
        ]
      },
      {
        id: "pillows",
        title: "Подушки",
        emoji: "🛏",
        note: "Декоративные подушки",
        subcategories: [
          { id: "pillows_square", title: "Квадратные", emoji: "◻️" },
          { id: "pillows_heart", title: "Сердце", emoji: "❤️" },
          { id: "pillows_gift", title: "Подарочные", emoji: "🎁" }
        ]
      },
      {
        id: "bags",
        title: "Сумки",
        emoji: "👜",
        note: "Шопперы и сумки",
        subcategories: [
          { id: "bags_shoppers", title: "Шопперы", emoji: "🛍" },
          { id: "bags_tote", title: "Tote bags", emoji: "👜" },
          { id: "bags_gift", title: "Подарочные сумки", emoji: "🎁" }
        ]
      }
    ];

    const products = [
      {
        id: 101,
        subcategory: "men_tshirts",
        title: "Мужская футболка с принтом",
        category: "Мужская одежда / Футболки",
        price: 99000,
        description: "Базовая футболка. Можно выбрать готовый принт или заказать свой.",
        img: "men_tshirt"
      },
      {
        id: 102,
        subcategory: "men_tanks",
        title: "Мужская майка с принтом",
        category: "Мужская одежда / Майки",
        price: 89000,
        description: "Лёгкая майка для лета, спорта и повседневной носки.",
        img: "men_tank"
      },
      {
        id: 103,
        subcategory: "men_sweaters",
        title: "Мужская толстовка с принтом",
        category: "Мужская одежда / Толстовки",
        price: 219000,
        description: "Удобная толстовка с качественной печатью.",
        img: "men_sweater"
      },
      {
        id: 104,
        subcategory: "men_sweatshirts",
        title: "Мужской свитшот с принтом",
        category: "Мужская одежда / Свитшоты",
        price: 199000,
        description: "Мягкий свитшот для стильного повседневного образа.",
        img: "men_sweatshirt"
      },
      {
        id: 105,
        subcategory: "men_hoodies",
        title: "Мужское худи с принтом",
        category: "Мужская одежда / Худи",
        price: 249000,
        description: "Тёплое худи с индивидуальным или готовым принтом.",
        img: "men_hoodie"
      },
      {
        id: 106,
        subcategory: "men_caps",
        title: "Мужская кепка с принтом",
        category: "Мужская одежда / Кепки",
        price: 79000,
        description: "Кепка с логотипом, текстом или авторским принтом.",
        img: "men_cap"
      },
      {
        id: 201,
        subcategory: "women_tshirts",
        title: "Женская футболка с принтом",
        category: "Женская одежда / Футболки",
        price: 99000,
        description: "Женская футболка с готовым или индивидуальным дизайном.",
        img: "women_tshirt"
      },
      {
        id: 202,
        subcategory: "women_hoodies",
        title: "Женское худи с принтом",
        category: "Женская одежда / Худи",
        price: 249000,
        description: "Комфортное худи с печатью для подарка или личного образа.",
        img: "women_hoodie"
      },
      {
        id: 301,
        subcategory: "kids_tshirts",
        title: "Детская футболка с принтом",
        category: "Детская одежда / Футболки",
        price: 79000,
        description: "Яркая детская футболка с печатью.",
        img: "kids_tshirt"
      },
      {
        id: 302,
        subcategory: "kids_hoodies",
        title: "Детское худи с принтом",
        category: "Детская одежда / Худи",
        price: 189000,
        description: "Детское худи с индивидуальным дизайном.",
        img: "kids_hoodie"
      },
      {
        id: 401,
        subcategory: "mugs_classic",
        title: "Классическая кружка с принтом",
        category: "Кружки / Классические кружки",
        price: 59000,
        description: "Белая кружка с фото, текстом или авторским принтом.",
        img: "classic_mug"
      },
      {
        id: 501,
        subcategory: "pillows_square",
        title: "Квадратная подушка с принтом",
        category: "Подушки / Квадратные",
        price: 99000,
        description: "Декоративная подушка с индивидуальной печатью.",
        img: "square_pillow"
      },
      {
        id: 601,
        subcategory: "bags_shoppers",
        title: "Шоппер с принтом",
        category: "Сумки / Шопперы",
        price: 89000,
        description: "Тканевый шоппер с вашим дизайном или готовым принтом.",
        img: "shopper_bag"
      }
    ];

    const content = document.getElementById("content");
    const backBtn = document.getElementById("backBtn");
    const historyStack = [];

    function formatPrice(price) {
      return price.toLocaleString("ru-RU") + " сум";
    }

    function pushScreen(fn) {
      historyStack.push(fn);
      backBtn.classList.add("show");
    }

    function goBack() {
      historyStack.pop();
      const prev = historyStack.pop();
      if (prev) {
        prev();
      } else {
        renderMainCategories();
      }
    }

    backBtn.addEventListener("click", goBack);

    function renderMainCategories() {
      historyStack.length = 0;
      backBtn.classList.remove("show");

      content.innerHTML = `
        <div class="screen-title">Каталог</div>
        <div class="grid">
          ${catalog.map(section => `
            <div class="card" onclick="renderSubcategories('${section.id}')">
              <div>
                <div class="emoji">${section.emoji}</div>
                <div class="card-title">${section.title}</div>
                <div class="card-note">${section.note}</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderSubcategories(sectionId) {
      pushScreen(renderMainCategories);

      const section = catalog.find(item => item.id === sectionId);

      content.innerHTML = `
        <div class="screen-title">${section.title}</div>
        <div class="grid">
          ${section.subcategories.map(sub => `
            <div class="card" onclick="renderProducts('${sub.id}', '${section.id}')">
              <div>
                <div class="emoji">${sub.emoji}</div>
                <div class="card-title">${sub.title}</div>
                <div class="card-note">Смотреть товары →</div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderProducts(subcategoryId, sectionId) {
      pushScreen(() => renderSubcategories(sectionId));

      const subcategoryProducts = products.filter(product => product.subcategory === subcategoryId);
      const subcategory = catalog
        .flatMap(section => section.subcategories)
        .find(sub => sub.id === subcategoryId);

      if (!subcategoryProducts.length) {
        content.innerHTML = `
          <div class="screen-title">${subcategory.title}</div>
          <div class="empty">
            В этом подразделе пока нет товаров.<br><br>
            Можно заказать индивидуальный принт через менеджера.
          </div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="screen-title">${subcategory.title}</div>
        <div class="products">
          ${subcategoryProducts.map(product => `
            <div class="product">
              <div class="product-img">WONDERSHOP</div>
              <div class="product-body">
                <div class="product-title">${product.title}</div>
                <div class="product-meta">${product.description}</div>
                <div class="price">${formatPrice(product.price)}</div>
                <button class="choose-btn" onclick="sendProduct(${product.id})">
                  ✓ Выбрать этот товар
                </button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function sendProduct(productId) {
      const product = products.find(item => item.id === productId);

      const payload = {
        print_id: product.id,
        print_name: product.title,
        category: product.category,
        price: product.price,
        img: product.img
      };

      if (tg) {
        tg.sendData(JSON.stringify(payload));
      } else {
        alert("Товар выбран: " + product.title);
      }
    }

    renderMainCategories();
  </script>
</body>
</html>
