<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wondershop Catalog</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#f6f2ec;--card:#fff;--text:#151515;--muted:#777;--line:#e7dfd3;
      --black:#111;--radius:22px;--shadow:0 12px 36px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:820px;margin:0 auto;padding:18px 14px 36px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .logo{font-size:24px;font-weight:950;letter-spacing:.08em}
    .tag{font-size:13px;color:var(--muted);margin-top:3px}
    .back{display:none;border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;font-weight:800;cursor:pointer}
    .back.show{display:block}
    h1{font-size:23px;margin:18px 0 10px}
    .hint{font-size:14px;color:var(--muted);line-height:1.45;margin:0 0 14px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:17px;min-height:108px;cursor:pointer;transition:.15s ease}
    .tile:active,.product:active{transform:scale(.985)}
    .emoji{font-size:31px;margin-bottom:12px}
    .tile-title{font-weight:950;font-size:17px;line-height:1.15}
    .tile-note{font-size:13px;color:var(--muted);margin-top:7px;line-height:1.35}
    .products{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .product{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden;cursor:pointer}
    .imgbox{height:210px;background:#eee8df;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .imgbox img{width:100%;height:100%;object-fit:contain;display:block}
    .noimg{font-weight:950;color:#999;letter-spacing:.08em}
    .body{padding:14px}
    .ptitle{font-size:16px;font-weight:950;line-height:1.2;min-height:38px}
    .meta{font-size:12px;color:var(--muted);margin:8px 0;line-height:1.35}
    .price{font-size:17px;font-weight:950;margin:10px 0}
    .btn{border:0;width:100%;border-radius:15px;background:#111;color:#fff;padding:13px 15px;font-weight:900;font-size:14px;cursor:pointer}
    .secondary{background:#fff;color:#111;border:1px solid #111;margin-top:9px}
    .detail{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
    .detail-img{width:100%;max-height:440px;object-fit:contain;background:#eee8df;display:block}
    .detail-body{padding:18px}
    .detail-title{font-size:24px;font-weight:950;margin-bottom:8px;line-height:1.15}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 14px}
    .chip{border:1px solid var(--line);background:#faf7f2;border-radius:999px;padding:8px 11px;font-size:12px;font-weight:800}
    .color-dot{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid #bbb;margin-right:5px;vertical-align:-1px}
    .search{width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:13px 15px;font-size:15px;margin:0 0 14px;outline:none}
    .empty{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;text-align:center;color:var(--muted);line-height:1.5}
    .pager{display:flex;gap:10px;margin:16px 0 0}
    .pager button{flex:1}
    @media(max-width:520px){.grid,.products{grid-template-columns:1fr}.imgbox{height:220px}.logo{font-size:21px}}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div><div class="logo">WONDERSHOP</div><div class="tag">Одежда и товары с принтами</div></div>
    <button class="back" id="backBtn">← Назад</button>
  </div>
  <main id="content"><div class="empty">Загрузка каталога...</div></main>
</div>
<script>
const tg = window.Telegram?.WebApp;
if (tg){tg.ready();tg.expand();}

let catalog = [];
let products = [];
const content = document.getElementById("content");
const backBtn = document.getElementById("backBtn");
const stack = [];
let currentPage = 1;
const perPage = 24;

function formatPrice(n){return Number(n || 0).toLocaleString("ru-RU")+" сўм";}
function esc(s){return String(s ?? "").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));}
function showBack(){backBtn.classList.toggle("show", stack.length>0);}
function push(fn){stack.push(fn);showBack();}
backBtn.onclick=()=>{const fn=stack.pop();showBack();fn?fn():renderSections();};

function productCountByCats(cats){
  return products.filter(p => cats.includes(p.category)).length;
}

function renderSections(){
  stack.length=0;showBack();
  content.innerHTML = `
    <h1>Каталог</h1>
    <div class="hint">Выберите раздел. Товары загружены из экспортного файла Wondershop.</div>
    <input class="search" placeholder="Поиск товара..." oninput="renderSearch(this.value)">
    <div class="grid">
      ${catalog.map(s=>`
        <div class="tile" onclick="renderSubcategories('${esc(s.id)}')">
          <div class="emoji">${s.emoji}</div>
          <div class="tile-title">${esc(s.title)}</div>
          <div class="tile-note">${productCountByCats(s.subcategories)} товаров</div>
        </div>`).join("")}
    </div>`;
}

function renderSearch(query){
  query = query.trim().toLowerCase();
  if(!query){renderSections();return;}
  const found = products.filter(p =>
    String(p.name).toLowerCase().includes(query) ||
    String(p.category).toLowerCase().includes(query) ||
    String(p.article).toLowerCase().includes(query)
  );
  renderProductList(found, "Поиск", `Найдено: ${found.length}`, () => renderSections(), 1);
}

function renderSubcategories(sectionId){
  const section = catalog.find(s=>s.id===sectionId);
  push(renderSections);
  content.innerHTML = `
    <h1>${esc(section.title)}</h1>
    <div class="hint">Выберите подраздел.</div>
    <div class="grid">
      ${section.subcategories.map(cat=>{
        const count = products.filter(p=>p.category===cat).length;
        return `<div class="tile" onclick="renderCategory('${esc(cat)}','${esc(sectionId)}')">
          <div class="emoji">•</div>
          <div class="tile-title">${esc(cat)}</div>
          <div class="tile-note">${count} товаров →</div>
        </div>`;
      }).join("")}
    </div>`;
}

function renderCategory(category, sectionId, page=1){
  push(()=>renderSubcategories(sectionId));
  const list = products.filter(p=>p.category===category);
  renderProductList(list, category, `Товаров: ${list.length}`, () => renderCategory(category, sectionId, page), page, category, sectionId);
}

function renderProductList(list, title, note, rerender, page=1, category="", sectionId=""){
  currentPage = page;
  const pages = Math.max(1, Math.ceil(list.length/perPage));
  const start = (page-1)*perPage;
  const shown = list.slice(start,start+perPage);

  if(!shown.length){
    content.innerHTML = `<h1>${esc(title)}</h1><div class="empty">Товары не найдены.</div>`;
    return;
  }

  content.innerHTML = `
    <h1>${esc(title)}</h1>
    <div class="hint">${esc(note)}${pages>1 ? ` · Страница ${page} из ${pages}` : ""}</div>
    <div class="products">
      ${shown.map(p=>`
        <div class="product" onclick="renderDetail('${esc(p.id)}', ${JSON.stringify(category)}, ${JSON.stringify(sectionId)}, ${page})">
          <div class="imgbox">${p.image ? `<img src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy">` : `<div class="noimg">WONDERSHOP</div>`}</div>
          <div class="body">
            <div class="ptitle">${esc(p.name)}</div>
            <div class="meta">${esc(p.category)}${p.article ? `<br>Артикул: ${esc(p.article)}` : ""}</div>
            <div class="price">${formatPrice(p.price)}</div>
            <button class="btn" onclick="event.stopPropagation(); renderDetail('${esc(p.id)}', ${JSON.stringify(category)}, ${JSON.stringify(sectionId)}, ${page})">Открыть товар</button>
          </div>
        </div>`).join("")}
    </div>
    ${pages>1 ? `<div class="pager">
      <button class="btn secondary" ${page<=1?"disabled":""} onclick="renderProductListByContext('${esc(title)}','${esc(category)}','${esc(sectionId)}',${page-1})">← Назад</button>
      <button class="btn secondary" ${page>=pages?"disabled":""} onclick="renderProductListByContext('${esc(title)}','${esc(category)}','${esc(sectionId)}',${page+1})">Вперёд →</button>
    </div>` : ""}`;
}

function renderProductListByContext(title, category, sectionId, page){
  if(category){
    const list = products.filter(p=>p.category===category);
    renderProductList(list, category, `Товаров: ${list.length}`, null, page, category, sectionId);
  }
}

function renderDetail(id, category="", sectionId="", page=1){
  const p = products.find(x=>String(x.id)===String(id));
  push(()=>{
    if(category) {
      const list=products.filter(x=>x.category===category);
      renderProductList(list, category, `Товаров: ${list.length}`, null, page, category, sectionId);
    } else renderSections();
  });

  const colors = (p.colors || []).slice(0, 12).map(c=>`<span class="chip"><span class="color-dot" style="background:${esc(c.hex || "#fff")}"></span>${esc(c.name)}</span>`).join("");
  const sizes = (p.sizes || []).slice(0, 16).map(s=>`<span class="chip">${esc(s)}</span>`).join("");

  content.innerHTML = `
    <div class="detail">
      ${p.image ? `<img class="detail-img" src="${esc(p.image)}" alt="${esc(p.name)}">` : ""}
      <div class="detail-body">
        <div class="detail-title">${esc(p.name)}</div>
        <div class="meta">
          ${esc(p.category)}${p.article ? `<br>Артикул: ${esc(p.article)}` : ""}${p.material ? `<br>Материал: ${esc(p.material)}` : ""}
        </div>
        ${sizes ? `<div class="chips">${sizes}</div>` : ""}
        ${colors ? `<div class="chips">${colors}</div>` : ""}
        <div class="price">${formatPrice(p.price)}</div>
        <button class="btn" onclick="sendProduct('${esc(p.id)}')">✓ Выбрать этот товар</button>
        <button class="btn secondary" onclick="window.open('${esc(p.url)}','_blank')">Открыть на сайте</button>
      </div>
    </div>`;
}

function sendProduct(id){
  const p = products.find(x=>String(x.id)===String(id));
  const payload = {
    print_id:p.id,
    print_name:p.name,
    category:p.category,
    article:p.article,
    price:p.price,
    img:p.image,
    url:p.url
  };
  if(tg){tg.sendData(JSON.stringify(payload));}
  else{alert("Выбран товар: "+p.name);}
}

fetch("./products.json")
  .then(r=>r.json())
  .then(data=>{
    catalog = data.catalog || [];
    products = data.products || [];
    renderSections();
  })
  .catch(err=>{
    console.error(err);
    content.innerHTML = `<div class="empty">Не удалось загрузить products.json</div>`;
  });
</script>
</body>
</html>
